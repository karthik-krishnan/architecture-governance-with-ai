# style-guide-sha256: 0366a11b28159bc2ee16439274016d7199709985c196301dd15947aa22f56741
extends: "spectral:oas"
rules:
  qsr-api-versioned-paths:
    message: "§1: API paths must include a version prefix as the first segment (e.g. /v1/orders). Found: {{property}}"
    description: "Every path must start with /v{n}/ where n is a positive integer."
    severity: error
    given: "$.paths.*~"
    then:
      function: pattern
      functionOptions:
        match: "^/v[0-9]+/"

  qsr-no-minor-versions:
    message: "§1: Path versions must be integers only (no minor versions like /v2.1/). Found: {{property}}"
    description: "Reject paths with decimal version numbers."
    severity: error
    given: "$.paths.*~"
    then:
      function: pattern
      functionOptions:
        notMatch: "^/v[0-9]+\\."

  qsr-resource-kebab-case:
    message: "§2: Path segments must use lowercase kebab-case. Found: {{property}}"
    description: "Each static path segment must be lowercase kebab-case; path parameters use camelCase inside braces."
    severity: warn
    given: "$.paths.*~"
    then:
      function: pattern
      functionOptions:
        match: "^(/v[0-9]+)?(/[a-z0-9-]+(/\\{[a-zA-Z][a-zA-Z0-9]*\\})?)*(/[a-z0-9-]+)?$"

  qsr-no-post-for-reads:
    message: "§3: POST operations must not be used for reads — summary/description suggests a read operation. Found operationId: {{value}}"
    description: "POST endpoints should not be named or described as fetches/reads."
    severity: warn
    given: "$.paths[*].post"
    then:
      field: operationId
      function: pattern
      functionOptions:
        notMatch: "^(get|fetch|find|search|list|read|Get|Fetch|Find|Search|List|Read|GET|FETCH|FIND|SEARCH|LIST|READ)"

  qsr-post-returns-201:
    message: "§4: POST operations must declare a 201 Created response. Declared responses: {{value}}"
    description: "Resource creation via POST must return 201."
    severity: error
    given: "$.paths[*].post.responses"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required:
            - "201"

  qsr-delete-returns-204:
    message: "§4: DELETE operations must declare a 204 No Content response. Declared responses: {{value}}"
    description: "Deletes return 204 with no body."
    severity: error
    given: "$.paths[*].delete.responses"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required:
            - "204"

  qsr-error-response-schema:
    message: "§5: Error responses must define a schema with code, message, and correlationId fields. {{error}}"
    description: "Standard error envelope is required on 4xx/5xx JSON responses."
    severity: error
    given: "$.paths[*][*].responses[400,401,403,404,409,422,500,503].content['application/json'].schema"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required:
            - code
            - message
            - correlationId
          properties:
            code:
              type: string
            message:
              type: string
            correlationId:
              type: string

  qsr-error-code-format:
    message: "§5: Error 'code' field must be uppercase snake-case string (e.g. ORDER_NOT_FOUND). {{error}}"
    description: "The error code enum/pattern must enforce uppercase snake-case."
    severity: warn
    given: "$.paths[*][*].responses[400,401,403,404,409,422,500,503].content['application/json'].schema.properties.code"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            type:
              enum:
                - string

  qsr-response-content-type:
    message: "§6: Response bodies must declare application/json as a content type. Declared: {{value}}"
    description: "Every response with a body must include application/json."
    severity: warn
    given: "$.paths[*][*].responses[200,201,202].content"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required:
            - "application/json"

  qsr-camel-case-properties:
    message: "§6: Schema property names must use camelCase. Found: {{property}}"
    description: "All schema property names must be camelCase."
    severity: warn
    given: "$.components.schemas[*].properties[*]~"
    then:
      function: casing
      functionOptions:
        type: camel

  qsr-pagination-no-page-param:
    message: "§7: Offset/page-based pagination is not permitted. Use cursor-based pagination with 'cursor' and 'limit'. Found: {{value}}"
    description: "Reject 'page' and 'offset' query parameters."
    severity: error
    given: "$.paths[*][*].parameters[?(@.in=='query')].name"
    then:
      function: pattern
      functionOptions:
        notMatch: "^(page|offset)$"

  qsr-operation-id-required:
    message: "§8: Every operation must have a unique operationId."
    description: "operationId is required for code generation and contract tooling."
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: operationId
      function: truthy

  qsr-openapi-version-3-1:
    message: "§8: Services must use OpenAPI 3.1. Found: {{value}}"
    description: "The OpenAPI version must be 3.1.x."
    severity: error
    given: "$.openapi"
    then:
      function: pattern
      functionOptions:
        match: "^3\\.1\\."

  qsr-info-required:
    message: "§8: The info block must declare title, version, and description. {{error}}"
    description: "Basic service metadata is required for the API catalogue."
    severity: error
    given: "$.info"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required:
            - title
            - version
            - description

  qsr-no-pii-in-paths:
    message: "§9: PII must not appear in path or query parameter names (they show in access logs). Found: {{value}}"
    description: "Reject PII field names in path and query parameters."
    severity: error
    given: "$.paths[*][*].parameters[?(@.in=='path' || @.in=='query')].name"
    then:
      function: pattern
      functionOptions:
        notMatch: "^([Ee][Mm][Aa][Ii][Ll]|[Pp][Hh][Oo][Nn][Ee]|[Mm][Oo][Bb][Ii][Ll][Ee]|[Ff][Uu][Ll][Ll][Nn][Aa][Mm][Ee]|[Ff][Ii][Rr][Ss][Tt][Nn][Aa][Mm][Ee]|[Ll][Aa][Ss][Tt][Nn][Aa][Mm][Ee]|[Ss][Uu][Rr][Nn][Aa][Mm][Ee]|[Aa][Dd][Dd][Rr][Ee][Ss][Ss]|[Dd][Oo][Bb]|[Dd][Aa][Tt][Ee][Oo][Ff][Bb][Ii][Rr][Tt][Hh]|[Ss][Ss][Nn]|[Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd]|[Ss][Ee][Cc][Rr][Ee][Tt])$"

  qsr-no-pii-in-path-segments:
    message: "§9: PII must not appear in path segments (they show in access logs). Found: {{property}}"
    description: "Reject paths whose segments name PII fields."
    severity: error
    given: "$.paths.*~"
    then:
      function: pattern
      functionOptions:
        notMatch: "/([Ee][Mm][Aa][Ii][Ll]|[Pp][Hh][Oo][Nn][Ee]|[Mm][Oo][Bb][Ii][Ll][Ee]|[Ff][Uu][Ll][Ll]-[Nn][Aa][Mm][Ee]|[Ff][Ii][Rr][Ss][Tt]-[Nn][Aa][Mm][Ee]|[Ll][Aa][Ss][Tt]-[Nn][Aa][Mm][Ee]|[Ss][Uu][Rr][Nn][Aa][Mm][Ee]|[Aa][Dd][Dd][Rr][Ee][Ss][Ss]|[Dd][Oo][Bb]|[Dd][Aa][Tt][Ee]-[Oo][Ff]-[Bb][Ii][Rr][Tt][Hh]|[Ss][Ss][Nn]|[Pp][Aa][Ss][Ss][Ww][Oo][Rr][Dd])(/|$)"